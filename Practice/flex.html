<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex Box</title>
    <style>
        h1 {
            text-align: center;
        }

        /* 
        body {
            font-size: 19px;

        } */

        .box-item {
            margin: 0px auto;
            background-color: rgb(207, 112, 17);
            color: white;
            height: 250px;
            width: 33%;
            border: 1px solid white;
            display: flex;


        }

        .row {
            margin-top: 20px;
           
            height: 30px;
            width: 33%;

        }
        .small{
 
            background-color: wheat;
            color: rgb(207, 112, 17);
           
            border: 1px solid rgb(207, 112, 17);
        }

        .box {
            display: flex;
            flex-wrap: wrap;

        }
    </style>
</head>

<body>
    <h1>Flex Box Property</h1>

    <div class="box">
        <div class="box-item">
            1
            <div class="row">
            <div class="small">1</div>
            <div class="small">2</div>
            <div class="small">3</div>
            </div>
            <div class="row">
            <div class="small">1</div>
            <div class="small">2</div>
            <div class="small">3</div>
            <div class="small">4</div>
            </div>
            <div class="row">
            <div class="small">1</div>
            <div class="small">2</div>
            <div class="small">3</div>
            <div class="small">4</div>
            <div class="small">5</div>
            </div>
        </div>
        
        <div class="box-item">2 </div>
        <div class="box-item"> 3</div>


    </div>
</body>

</html>
