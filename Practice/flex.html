<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex Box</title>
    <style>
        h1 {
            text-align: center;
        }

        body {
            font-size: 19px;

        }

        .box-item {
            margin: 0px auto;
            background-color: rgb(207, 112, 17);
            color: white;
            height: 250px;
            width: 33%;
            border: 1px solid white;
            display: flex;
            flex-wrap: wrap;

        }
        .box {
            display: flex;
            flex-wrap: wrap;

        }
    </style>
</head>

<body>
    <h1>Flex Box Property</h1>

    <div class="box">
        <div class="box-item" id="b1">
            1
            <div class="row" id="i1">
                1
            </div>
            <div class="row" id="i2">
                2
            </div>
            <div class="row" id="i3">
                3
            </div>
        </div>
        <div class="box-item" id="b2">
            2
        </div>
        <div class="box-item" id="b3">
            3
        </div>


    </div>
</body>

</html>
