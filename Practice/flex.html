<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex Box</title>
    <style>
        h1{
            text-align: center;
        }
        body{
            font-size: 19px;
            
        }
        .box-item{
            padding: 10px;
            color: white;
            height: 200px;
            width:  300px;
            border: 3px solid white;
            /* align-content: center;
            text-align: center; */
        }
        #b1{
            flex-direction: row;
            background-color: rgb(207, 112, 17);
        }
        #b2{
            background-color: rgb(207, 112, 17);
        }
        #b3{
            background-color: rgb(207, 112, 17);
        }
        .box{
            display: flex;
            flex-wrap: wrap;
        }

    </style>
</head>
<body>
    <h1>Flex Box Property</h1>
    
    <div class="box">
        <div class="box-item" id="b1">
            1
            <div class="in-div" id="i1">
                1
            </div>
            <div class="in-div" id="i2">
                1
            </div>
            <div class="in-div" id="i3">
                1
            </div>
        </div>
        <div class="box-item" id="b2">
            2
        </div>
        <div class="box-item" id="b3">
            3
        </div>
       
        
    </div>
</body>
</html>
