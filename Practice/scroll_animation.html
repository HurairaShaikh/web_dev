<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smooth Scroll</title>
    <style>
      
        .Home,
        .About,
        .Services,
        .Login-Signup,
        .Contact-us {
            height: 100vh;
            background-color: paleturquoise;
            text-align: center;
            font-size: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
            transition: color 0.3s;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: darkblue;
            padding: 10px;
            text-align: center;
            z-index: 1000;
        }
    </style>
</head>

<body>
   
    <main>
        <nav>
            <a href="#Home">Home</a>
            <a href="#About">About</a>
            <a href="#Services">Services</a>
            <a href="#Login-Signup">Login/signup</a>
            <a href="#Contact-us">Contact us</a>
        </nav>
        <section id="Home" class="Home"> Home </section>
        <section id="About" class="About">About</section>
        <section id="Services" class="Services">Services</section>
        <section id="Login-Signup" class="Login-Signup">Authentication</section>
        <section id="Contact-us" class="Contact-us">Contact us</section>
    </main>

</body>

</html>
