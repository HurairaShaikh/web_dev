<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Amazon</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css">
  <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"> -->
</head>

<body>
  <header>
    <div class="navbar">
      <div class="nav-logo border">
        <div class="logo"></div>
      </div>

      <div class="location border">
        <p class="first-text">Deliver to</p>
        <div class="address-in">
          <i class="fa-solid fa-location-dot"></i>
          <p class="sec-text">Pakistan</p>
        </div>
      </div>

      <div class="nav-search-bar">
        <select class="select-bar">
          <option>ALL</option>
        </select>
        <input class="search-bar" type="text" name="Search" placeholder="Search Amazon" id="">
        <div class="search-icon">
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>
      </div>

      <div class="language border">
        <select class="lan">
          <option >ENG</option>
        </select>
      </div>

      <div class="auth border">
        <p class="auth-first">
          Hello,sign in
        </p>
        <select class="auth-select">
          <option>
            Accounts & Lists
          </option>
        </select>
      </div>

      <div class="policies border">
        <p class="pol-first">
        Returns
        </p>
        <p class="pol-sec">
          & Orders
        </p>
      </div>

      <div class="cart border">
        <i class="fa-solid fa-cart-shopping"></i>
        Cart
      </div>

    </div>

    
  </header>


  <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script> -->
</body>

</html>
