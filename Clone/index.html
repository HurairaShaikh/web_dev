<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clone</title>
    <link rel="stylesheet" href="https://unpkg.com/flickity@2/dist/flickity.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="navbar-above">
            <div class="links">
                <div class="links-options">
                    <p>Save More on App</p>
                    <p>Sell on Daraz</p>
                    <p>Help & Support</p>
                    <p>Login</p>
                    <p>SignUp</p>
                </div>
            </div>
        </div>


        <div class="navbar-bottom">
            <div class="nav-logo">
                <div class="logo"></div>
            </div>

            <div class="search-bar">
                <div class="search">
                    <input type="search" name="text" class="search" placeholder="Search in Daraz">
                </div>
                <div class="search-icon">
                    <i class="fa-brands fa-sistrix"></i>
                </div>

            </div>

            <div class="cart">
                <i class="fa-solid fa-cart-shopping"></i>
            </div>
        </div>
    </header>
    <div class="carousel" data-flickity='{ "autoPlay": true }'>
        <div class="carousel-cell">
            <img class="img1" src="assets/d1.png" alt="pic">
        </div>
        <div class="carousel-cell">
            <img src="assets/d2.png" alt="pic">
        </div>
        <div class="carousel-cell">
            <img src="assets/d3.png" alt="pic">
        </div>
        <div class="carousel-cell">
            <img src="assets/d4.png" alt="pic">
        </div>
        <div class="carousel-cell">
            <img src="assets/d5.png" alt="pic">
        </div>
    </div>

    <div class="body-content">

        <h3>Flash Sale</h3>



        <div class="shop">
            <div class="sale-now">
                On Sale Now
            </div>
            <div class="shop-all">
                Shop All Products
            </div>
        </div>
        <div class="first-layout">
            <div class="item1"></div>
            <div class="item2"></div>
            <div class="item3"></div>
            <div class="item4"></div>
            <div class="item5"></div>
            <div class="item6"></div>
        </div>
    </div>


    <script src="https://unpkg.com/flickity@2/dist/flickity.pkgd.min.js"></script>
</body>

</html>
