<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="style2.css">
    <style>
h1 {
  margin-bottom: 5px;
}

p {
  margin-top: 0px;
}
</style>
</head>
<body>
    <header>  
     <h1 class="heading">Contact Form</h1>
    <p class="para">please fill all the text in the fields</p>
    </header>

    <form action="" class="container">
   Your Name <input type="text" name="Name" id="Name" placeholder="Your Full Name">
   <br>
   Your Email  <input type="email" name="email" id="
   email" placeholder="Your Email">
   <br>
   Message:
   <br>
    <textarea cols="50" rows="4"
     name="Message" id="Message" placeholder="Your Message to us"></textarea>
     <br>
     Subject:
     <input type="text" name="Subject" id="job inquiry" placeholder="Job Inquiry ">
     <br>
     <input type="submit" value="Send">
     </form>
</body>
