<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
</head>

<body>
    <header>
        <h1>
            Payment Portal
        </h1>
        
        <nav>
            <a href="#">Home</a>
            <a href="#">Login in</a>
            <a href="#">Sign up</a>
            <a href="#">Contact</a>
            <a href="#">About Us</a>
        </nav>
    </header>
    <form action="">
        
        <p>Name <input type="text" placeholder="Name" name="name" id="name" required></p>
        <fieldset>
            <legend>Gender</legend>

            <p> <input type="radio" name="gender" id="male" required>
                Male <input type="radio" name="gender" id="female" required>Female
            </p>
        </fieldset>

        <p>Email <input type="email" placeholder="xyz@gmail.com" name="email" id="email" required></p>
        <p>Date of Birth <input type="date" name="date" id="date"></p>
        <p>Address <textarea cols="30" placeholder="Enter Address" rows="3" name="Address" id="Address" required></textarea></p>
        <p>Postal Code <input type="number" placeholder="12345" name="pincode" id="pincode"></p>
        <h2>Payment information</h2>
        <p>Card type :
            <select name="Card_type" id="Card_type" required>
                <option value="">--select a Card type</option>
                <option value="Master card">Master card</option>
                <option value="Paypal">Paypal</option>
                <option value="Visa">Visa</option>
            </select>
        </p>
      
        <p>Card number <input type="number" placeholder="1111-2222-3333-4444" name="number" id="number" required></p>
        <p>
            Expiration date <input type="date" name="Expiration_date
        " id="Expiration_date" required>
        </p>
        <p>
            CVV <input type="password" placeholder="123" name="password" id="password">
        </p>
        <input type="submit" value="Pay Now">
<p>
    <input type="reset" value="reset">
</p>
  
    </form>
</body>

</html>
