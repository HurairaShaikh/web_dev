<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Portal</title>
</head>
<body>
    <header>
    <h1>Admission Form</h1>
    <p>
      <b> <u>Welcome to Shaiku institute of Information and technology</u> </b>
    </p>
    <p>
        <em>
 Plz fill the form to Register in our Institute.
        </em>
    </p>
    </header>
    <section>
      Name  <input type="text" name="Name" id="Name" required >
      <br>
      <br>
      Father Name  <input type="text" name="Father Name" id="Father Name" required>
      <br>
      <br>
      Email  <input type="text" name="Name" id="Name" required >
     <p>
        <fieldset >

        <legend>Gender</legend >
        <input type="radio" name="Gender" id="male" required>Male
        <input type="radio" name="Gender" id="female" required>Female
        </fieldset>
     </p>
     <p>
        Date of Birth  
        <input type="date" name="Date" id="DoB" required>
        <p>
        Address <Textarea cols="30" rows="3" name="Address" id="Address" required></Textarea>
        </Textarea>
        </p>
        
    </section>
    
</body>
</html>
